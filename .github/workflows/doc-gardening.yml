name: Doc Gardening

on:
  workflow_dispatch:
  schedule:
    - cron: "0 15 * * 4"

jobs:
  garden:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm doc:garden
      - uses: actions/upload-artifact@v4
        with:
          name: doc-garden-report
          path: artifacts/doc-garden-report.md
